litellm_settings:
  drop_params: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

router_settings:
  num_retries: 0
  retry_policy:
    RateLimitErrorRetries: 0
    ContentPolicyViolationErrorRetries: 0
  allowed_fails: 1
  cooldown_time: 60
  fallbacks:
    - {"orchestrator-default": ["orchestrator-fallback-1", "orchestrator-fallback-2"]}
    - {"research-default": ["research-fallback-1", "research-fallback-2"]}
    - {"portfolio-default": ["portfolio-fallback-1", "portfolio-fallback-2"]}
    - {"risk-default": ["risk-fallback-1", "risk-fallback-2"]}
    - {"strategy-default": ["strategy-fallback-1", "strategy-fallback-2"]}
