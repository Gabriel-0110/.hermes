# Alembic migration configuration for hermes-agent
# https://alembic.sqlalchemy.org/en/latest/tutorial.html
#
# Run migrations:
#   alembic upgrade head          # apply all pending migrations
#   alembic downgrade -1          # roll back one migration
#   alembic revision --autogenerate -m "description"   # generate a new migration
#
# Stamp an existing database (already bootstrapped via create_all) as current:
#   alembic stamp head

[alembic]
script_location = alembic
prepend_sys_path = .

# Use DATABASE_URL from the environment (same var as the application).
# Override on the command line with: alembic -x db_url=postgresql://...
sqlalchemy.url =

[post_write_hooks]
# No post-write hooks configured.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
