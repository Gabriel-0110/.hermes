name: Node CI

on:
  push:
    paths:
      - "apps/web/**"
      - "package.json"
      - ".github/workflows/node-ci.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - "package.json"
      - ".github/workflows/node-ci.yml"

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - run: npm run lint --workspace @hermes/web
      - run: npm run build --workspace @hermes/web
