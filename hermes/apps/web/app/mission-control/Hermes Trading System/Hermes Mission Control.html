<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Hermes Mission Control — Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #07080a; color: #e8e9ec; font-family: 'Inter Tight', system-ui, sans-serif; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="variant-a.jsx"></script>
<script type="text/babel" src="variant-b.jsx"></script>

<script type="text/babel" data-presets="react">
  function App() {
    return (
      <window.DesignCanvas title="Hermes Mission Control · Redesign" initialZoom={0.62}>
        <window.DCSection id="intro" title="Design rationale">
          <window.DCArtboard id="rationale" label="Brief / system notes" width={1240} height={760}>
            <div style={{
              width: "100%", height: "100%", background: "#0d0e10", color: "#e8e9ec",
              padding: 56, fontFamily: "'Inter Tight', system-ui, sans-serif",
              display: "grid", gridTemplateColumns: "1fr 1fr", columnGap: 56, rowGap: 24,
              alignContent: "start",
            }}>
              <div style={{ gridColumn: "1 / -1", borderBottom: "1px solid #23252b", paddingBottom: 20, marginBottom: 12 }}>
                <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: "#6aa7ff", letterSpacing: "0.2em", textTransform: "uppercase" }}>Hermes · Mission Control</div>
                <h1 style={{ margin: "8px 0 0", fontSize: 42, letterSpacing: "-0.02em", fontWeight: 500, maxWidth: "18ch" }}>
                  A single operating picture for a trader under pressure.
                </h1>
              </div>

              <div>
                <h3 style={{ margin: 0, fontSize: 13, color: "#6aa7ff", fontFamily: "'JetBrains Mono', monospace", letterSpacing: "0.16em", textTransform: "uppercase" }}>What this page answers</h3>
                <ul style={{ marginTop: 10, paddingLeft: 18, lineHeight: 1.65, fontSize: 14 }}>
                  <li>What matters in the market <em>right now</em>.</li>
                  <li>What positions and exposures need attention.</li>
                  <li>What just happened — and why.</li>
                  <li>What I should do next, and what the agents are doing for me.</li>
                </ul>
              </div>
              <div>
                <h3 style={{ margin: 0, fontSize: 13, color: "#6aa7ff", fontFamily: "'JetBrains Mono', monospace", letterSpacing: "0.16em", textTransform: "uppercase" }}>Layout philosophy</h3>
                <ul style={{ marginTop: 10, paddingLeft: 18, lineHeight: 1.65, fontSize: 14 }}>
                  <li>3-column desktop: context rail · decision center · operator rail.</li>
                  <li>Top HUD for session/regime/latency; bottom strip for health.</li>
                  <li>Dense, gridded, calm — information earns its space.</li>
                  <li>Collapses: rails stack on tablet, center stays dominant.</li>
                </ul>
              </div>

              <div>
                <h3 style={{ margin: 0, fontSize: 13, color: "#6aa7ff", fontFamily: "'JetBrains Mono', monospace", letterSpacing: "0.16em", textTransform: "uppercase" }}>Renamed modules</h3>
                <ul style={{ marginTop: 10, paddingLeft: 18, lineHeight: 1.65, fontSize: 14, fontFamily: "'JetBrains Mono', monospace", fontSize: 12 }}>
                  <li>Portfolio command center → <strong style={{ color: "#fff" }}>Portfolio Command</strong></li>
                  <li>TradingView-linked market focus → <strong style={{ color: "#fff" }}>Market Focus</strong></li>
                  <li>Trade tape / movement journal → <strong style={{ color: "#fff" }}>Execution Feed</strong></li>
                  <li>Task lanes → <strong style={{ color: "#fff" }}>Research Pipeline</strong></li>
                  <li>Execution timeline → <strong style={{ color: "#fff" }}>Operational Timeline</strong></li>
                  <li>+ new: <strong style={{ color: "#fff" }}>Approval Queue · Risk Posture · Watchlist</strong></li>
                </ul>
              </div>
              <div>
                <h3 style={{ margin: 0, fontSize: 13, color: "#6aa7ff", fontFamily: "'JetBrains Mono', monospace", letterSpacing: "0.16em", textTransform: "uppercase" }}>Variants</h3>
                <ul style={{ marginTop: 10, paddingLeft: 18, lineHeight: 1.7, fontSize: 14 }}>
                  <li><strong>A · Institutional</strong> — near-monochrome, hairline rules, restrained accent. For clarity-first desks.</li>
                  <li><strong>B · Mission Ops</strong> — cinematic graphite, cyan HUD, tactical framing (code prefixes, corner ticks, status strips). For a cockpit feel.</li>
                </ul>
                <p style={{ fontSize: 12, color: "#7d8088", marginTop: 14, lineHeight: 1.5 }}>
                  Both are fully original — dark graphite surfaces, JetBrains Mono for numerics, Inter Tight for UI.
                  Drag artboards to reorder. Click ⤢ on an artboard to enter focus mode.
                </p>
              </div>
            </div>
          </window.DCArtboard>
        </window.DCSection>

        <window.DCSection id="variant-a" title="Variant A · Institutional">
          <window.DCArtboard id="var-a" label="Institutional — ultra-clean, hairline rules, near-monochrome" width={1440} height={1024}>
            <VariantA />
          </window.DCArtboard>
        </window.DCSection>

        <window.DCSection id="variant-b" title="Variant B · Mission Ops">
          <window.DCArtboard id="var-b" label="Mission Ops — cinematic graphite with cyan HUD" width={1440} height={1024}>
            <VariantB />
          </window.DCArtboard>
        </window.DCSection>
      </window.DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
