skill_id: market_regime_analysis
name: Market Regime Analysis
purpose: Determine high-level market regime from wrapped market data and news context.
agents_allowed: [market_researcher]
tools_required: [get_market_overview, get_crypto_prices, get_ohlcv]
inputs: [symbols, timeframe]
outputs: [regime_summary, supporting_metrics]
dependencies: [cross_asset_context]
usage_example: "Assess BTC and ETH regime using market overview plus daily OHLCV."
limitations: [uses_simple_placeholder_logic_until_custom_models_are_added]
audit_logging_requirements: [log_symbols, log_timeframe, log_summary]
description: Produce a regime label and explanation for downstream strategy/risk consumers.
failure_modes: [missing_market_provider, insufficient_bars]

