skill_id: execution_requesting
name: Execution Requesting
purpose: Convert an approved action into a normalized execution request for the exchange execution layer, including BitMart futures reduce-only close orders.
agents_allowed: [orchestrator_trader]
tools_required: [get_execution_status]
inputs: [approved_action_plan, risk_approval]
outputs: [execution_request, order_status]
dependencies: [workflow_routing, decision_aggregation]
usage_example: "Submit a risk-approved BTC spot buy to BitMart via the CCXT execution adapter."
limitations: [bitmart_is_the_only_configured_exchange, explicit_live_unlock_required, futures_close_actions_supported_via_reduce_only, futures_open_actions_need_position_mode_and_margin_validation]
backend_implementation: CCXTExecutionClient in backend/integrations/execution/ccxt_client.py
audit_logging_requirements: [log_request_payload, log_execution_status, log_order_id]
description: Build and hand off a risk-approved action plan to the CCXT execution adapter layer and capture the resulting order status, with explicit support for BitMart futures reduce-only exits.
failure_modes: [missing_risk_approval, exchange_credentials_not_configured, order_rejected_by_exchange, paper_mode_guard_blocked_live_close]

