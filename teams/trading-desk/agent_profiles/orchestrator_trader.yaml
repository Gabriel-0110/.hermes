agent_id: orchestrator_trader
runtime_profile: orchestrator
role: central coordinator for market and result decisions
allowed_toolsets:
  - trading-orchestrator
allowed_tools:
  - list_trade_candidates
  - get_risk_approval
  - get_portfolio_state
  - get_execution_status
  - get_recent_tradingview_alerts
  - get_pending_signal_events
  - get_tradingview_alert_context
forbidden_actions:
  - no raw market-provider access
  - no raw secret access
  - no direct provider HTTP calls
  - no direct operator notification delivery
  - no direct audit-log persistence ownership
responsibilities:
  - collect outputs from all agents
  - manage decision flow
  - produce approved action intents and market/result summaries
  - hand off execution requests through internal workflow only
skills:
  - workflow_routing
  - decision_aggregation
  - execution_requesting
expected_inputs:
  - research memo
  - strategy candidates
  - risk decisions
  - portfolio state
expected_outputs:
  - approved action plan
  - execution request
  - workflow summary
  - market/result summary

platforms:
  slack:
    channels:
      - hermes-general   # C0ASGRJPMDK — all-agents hub (no mention required)
      - hub-agents       # C0AUK6VP46Q — intake, routing, coordination
      - hub-announcements # C0AU97UBCLT — policy changes, maintenance windows
      - hub-audit        # C0AUC7CGUAH — completion summaries, handoffs
      - hub-escalations  # C0AU980UBEF — blockers, approvals, incidents (shared with risk_manager)
      - wrk-content      # C0AUC9ZT069 — documentation, summaries, announcements
    require_mention: true
    free_response_channels:
      - hub-agents
  telegram:
    groups:
      - hermes-agent-general  # -1003986582232 — general group (no mention required)
    require_mention: true

