team_name: hermes-trading-desk
version: 1
source_of_truth:
  identity: /Users/openclaw/.hermes/IDENTITY.md
  user: /Users/openclaw/.hermes/USER.md
  soul: /Users/openclaw/.hermes/SOUL.md
  team_manifest: /Users/openclaw/.hermes/teams/trading-desk/TEAM.md
sync_rules:
  shared_identity_required: true
  shared_user_rules_required: true
  orchestrator_final_state_authority: true
  critical_actions_require_confirmation: true
agents:
- name: orchestrator
  canonical_agent_id: orchestrator_trader
  profile: orchestrator
  model: ''
  provider: ''
  role: central coordinator for market and result decisions
  responsibilities:
  - receive goals
  - collect outputs from all agents
  - manage decision flow
  - produce approved action intents and market/result summaries
  - hand off execution requests through internal workflow or guarded execution tools only
  reports_to: null
  forbidden_actions:
  - no raw market-provider access
  - no raw secret access
  - no direct provider HTTP calls
  - no direct operator notification delivery
  - no direct audit-log persistence ownership
  allowed_toolsets:
  - trading-orchestrator
  allowed_tools:
  - list_trade_candidates
  - get_risk_approval
  - get_portfolio_state
  - get_execution_status
  - get_recent_tradingview_alerts
  - get_pending_signal_events
  - get_tradingview_alert_context
  - delegate_task
  assigned_skills:
  - workflow_routing
  - decision_aggregation
  - execution_requesting
  expected_outputs:
  - approved action plan
  - execution request
  - workflow summary
  - market/result summary
- name: execution-agent
  canonical_agent_id: execution_agent
  profile: execution-agent
  model: ''
  provider: ''
  role: mechanical order executor — fires pre-approved tickets, nothing more
  responsibilities:
  - check execution readiness via get_execution_status
  - call place_order with the exact approved ticket parameters
  - report order ID, fill status, and errors
  - call cancel_order only when explicitly instructed
  reports_to: orchestrator
  forbidden_actions:
  - no trade evaluation or modification
  - no strategy generation
  - no raw secret access
  - no unsolicited cancel or close actions
  allowed_toolsets:
  - trading-execution
  allowed_tools:
  - get_execution_status
  - place_order
  - cancel_order
  - get_portfolio_state
  - get_open_orders
  - send_execution_update
  assigned_skills: []
  expected_outputs:
  - order confirmation with order ID
  - execution result (filled, rejected, blocked)
  - error detail if failed

- name: market-researcher
  canonical_agent_id: market_researcher
  profile: market-researcher
  model: ''
  provider: ''
  role: market context, narrative, regime, catalyst and watchlist intelligence
  responsibilities:
  - analyze market regime
  - summarize catalysts
  - generate ranked watchlists
  - enrich signals with macro, news, social, and onchain context
  - produce forward scenario forecasts from wrapped time-series inputs
  reports_to: orchestrator
  forbidden_actions:
  - no trade placement
  - no direct secret access
  allowed_toolsets:
  - trading-research
  allowed_tools:
  - get_crypto_prices
  - get_market_overview
  - get_ohlcv
  - get_crypto_news
  - get_general_news
  - get_social_sentiment
  - get_onchain_wallet_data
  - get_smart_money_flows
  - get_event_risk_summary
  - get_funding_rates
  - get_liquidation_zones
  - get_recent_trades
  - get_forecast_projection
  - save_research_memo
  - get_research_memos
  - list_strategies
  assigned_skills:
  - market_regime_analysis
  - watchlist_generation
  - catalyst_detection
  - narrative_shift_detection
  - cross_asset_context
  - chronos2_forecasting
  expected_outputs:
  - regime summary
  - catalyst summary
  - ranked watchlist
  - risk notes
  - research memo
  - forecast scenario package
- name: strategy-agent
  canonical_agent_id: strategy_agent
  profile: strategy-agent
  model: ''
  provider: ''
  role: generate structured trade ideas based on market data and research context
  responsibilities:
  - scan setups
  - build trade candidates
  - match setups to regime
  - define entry, stop, target, and invalidation
  - consume research-provided forecast context when available
  reports_to: orchestrator
  forbidden_actions:
  - no direct execution
  - no raw news firehose dependency unless wrapped
  allowed_toolsets:
  - trading-strategy
  allowed_tools:
  - get_crypto_prices
  - get_ohlcv
  - get_indicator_snapshot
  - get_market_overview
  - get_onchain_signal_summary
  - get_smart_money_flows
  - get_order_book
  - get_recent_trades
  - list_strategies
  - evaluate_strategy
  - get_research_memos
  assigned_skills:
  - setup_scanning
  - signal_scoring
  - trade_plan_generation
  - regime_matching
  - invalidation_modeling
  expected_outputs:
  - structured trade candidate
  - confidence score
  - entry/stop/target plan
  - invalidation logic
- name: risk-manager
  canonical_agent_id: risk_manager
  profile: risk-manager
  model: ''
  provider: ''
  role: hard gatekeeper for risk controls
  responsibilities:
  - validate proposed trades
  - size risk
  - detect event risk, volatility risk, and concentration risk
  - approve, reject, or resize proposals
  - escalate operator-visible risk incidents and policy violations
  reports_to: orchestrator
  forbidden_actions:
  - no bypass of workflow
  - no raw direct execution
  allowed_toolsets:
  - trading-risk
  allowed_tools:
  - get_ohlcv
  - get_volatility_metrics
  - get_correlation_inputs
  - get_event_risk_summary
  - get_social_sentiment
  - get_onchain_wallet_data
  - get_smart_money_flows
  - get_portfolio_state
  - get_crypto_prices
  - get_risk_approval
  - get_risk_state
  - set_kill_switch
  - set_risk_limits
  - get_order_book
  - get_funding_rates
  - get_liquidation_zones
  - send_notification
  assigned_skills:
  - pretrade_risk_validation
  - position_sizing
  - drawdown_protection
  - concentration_analysis
  - volatility_risk_control
  - event_risk_control
  - incident_escalation
  expected_outputs:
  - risk approval or rejection
  - max size recommendation
  - stop or invalidation guidance
  - risk flags
  - incident alert
- name: portfolio-monitor
  canonical_agent_id: portfolio_monitor
  profile: portfolio-monitor
  model: ''
  provider: ''
  role: source of truth for positions, balances, exposure and reconciliation
  responsibilities:
  - track holdings and PnL
  - detect drift
  - reconcile internal state with external account state
  - surface anomalies
  reports_to: orchestrator
  forbidden_actions:
  - no discretionary strategy generation
  - no direct raw secret exposure
  allowed_toolsets:
  - trading-portfolio
  allowed_tools:
  - get_portfolio_state
  - get_crypto_prices
  - get_market_overview
  - get_onchain_wallet_data
  - get_wallet_transactions
  - send_notification
  assigned_skills:
  - pnl_tracking
  - exposure_tracking
  - reconciliation
  - drift_detection
  - anomaly_detection
  expected_outputs:
  - portfolio health summary
  - pnl snapshot
  - reconciliation report
  - drift alert
trading_mode:
  mode: live
  execution_base_url: https://api-cloud-v2.bitmart.com
  forbid_live_execution: false
  live_execution_requires_env_unlock: true
  required_env_unlock:
    HERMES_TRADING_MODE: live
    HERMES_ENABLE_LIVE_TRADING: 'true'
    HERMES_LIVE_TRADING_ACK: I_ACKNOWLEDGE_LIVE_TRADING_RISK
  readiness_required: api_execution_ready
  allowed_live_base_urls:
  - https://api-cloud-v2.bitmart.com
  - https://api-cloud.bitmart.com
  enforcement_script: null
  enforcement_mode: live_guarded
  required_execution_wrapper: null
  required_demo_claim_before_execution: false
  required_explicit_human_confirmation_for_write_actions: true
